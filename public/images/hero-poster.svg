<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9F1E4"/>
      <stop offset="60%" stop-color="#E8DBB7"/>
      <stop offset="100%" stop-color="#DDA13E"/>
    </linearGradient>
    <radialGradient id="hero-vignette" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#1A2639" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1A2639" stop-opacity="0.18"/>
    </radialGradient>
    <pattern id="hero-grain" width="180" height="180" patternUnits="userSpaceOnUse">
      <path d="M0 180L180 0" stroke="#1A2639" stroke-opacity="0.04" stroke-width="1"/>
      <path d="M0 0L180 180" stroke="#1A2639" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#hero-bg)"/>
  <rect width="1920" height="1080" fill="url(#hero-grain)"/>
  <rect width="1920" height="1080" fill="url(#hero-vignette)"/>
</svg>
